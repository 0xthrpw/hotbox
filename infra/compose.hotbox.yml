name: hotbox-stack

networks:
  hotbox-public:
    name: hotbox-public

volumes:
  hotbox-pg-data: {}
  traefik-acme: {}

services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    networks: [hotbox-public]
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: "${ACME_EMAIL}"
      HOTBOX_WEB_HOST: "${HOTBOX_WEB_HOST}"
      HOTBOX_API_HOST: "${HOTBOX_API_HOST}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # Directory mount, not single-file. Single-file bind-mounts pin the host
      # inode at mount time; editors that atomically rename (nano, sed -i, vim
      # w/ backup) create a new inode and the container keeps reading the old
      # one — Traefik's `watch: true` never sees the change.
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-acme:/etc/traefik/acme

  hotbox-pg:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [hotbox-public]
    environment:
      POSTGRES_USER: hotbox
      POSTGRES_PASSWORD: "${HOTBOX_PG_PASSWORD}"
      POSTGRES_DB: hotbox
    volumes:
      - hotbox-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "hotbox"]
      interval: 10s
      timeout: 5s

  hotbox-api:
    image: ghcr.io/${HOTBOX_REPO}/hotbox-api:${HOTBOX_VERSION}
    restart: unless-stopped
    depends_on:
      hotbox-pg:
        condition: service_healthy
    networks: [hotbox-public]
    environment:
      DATABASE_URL: "postgres://hotbox:${HOTBOX_PG_PASSWORD}@hotbox-pg:5432/hotbox"
      HOST_ID: "${HOTBOX_HOST_ID}"
      HOTBOX_MASTER_KEY_PATH: /etc/hotbox/master.key
      WEB_ORIGIN: "https://${HOTBOX_WEB_HOST}"
      PORT: "3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/hotbox/master.key:/etc/hotbox/master.key:ro
    labels:
      hotbox.managed: "true"
      traefik.enable: "true"
      traefik.http.routers.hotbox-api.rule: "Host(`${HOTBOX_API_HOST}`)"
      traefik.http.routers.hotbox-api.entrypoints: "websecure"
      traefik.http.routers.hotbox-api.tls.certresolver: "le"
      traefik.http.services.hotbox-api.loadbalancer.server.port: "3000"

  hotbox-web:
    image: ghcr.io/${HOTBOX_REPO}/hotbox-web:${HOTBOX_VERSION}
    restart: unless-stopped
    depends_on: [hotbox-api]
    networks: [hotbox-public]
    environment:
      HOTBOX_API_URL: "http://hotbox-api:3000"
      PORT: "3000"
    labels:
      hotbox.managed: "true"
      traefik.enable: "true"
      traefik.http.routers.hotbox-web.rule: "Host(`${HOTBOX_WEB_HOST}`)"
      traefik.http.routers.hotbox-web.entrypoints: "websecure"
      traefik.http.routers.hotbox-web.tls.certresolver: "le"
      traefik.http.services.hotbox-web.loadbalancer.server.port: "3000"

  hotbox-metrics-scraper:
    image: ghcr.io/${HOTBOX_REPO}/hotbox-metrics-scraper:${HOTBOX_VERSION}
    restart: unless-stopped
    depends_on:
      hotbox-pg:
        condition: service_healthy
    networks: [hotbox-public]
    environment:
      DATABASE_URL: "postgres://hotbox:${HOTBOX_PG_PASSWORD}@hotbox-pg:5432/hotbox"
      HOST_ID: "${HOTBOX_HOST_ID}"

  # Single shared rpc-proxy: receives all token-authenticated RPC traffic, looks
  # up the upstream Erigon based on the x-hotbox-service-id header from
  # ForwardAuth, forwards, logs each call to rpc_requests.
  hotbox-rpc-proxy:
    image: ghcr.io/${HOTBOX_REPO}/hotbox-rpc-proxy:${HOTBOX_VERSION}
    restart: unless-stopped
    depends_on:
      hotbox-pg:
        condition: service_healthy
    networks: [hotbox-public]
    environment:
      DATABASE_URL: "postgres://hotbox:${HOTBOX_PG_PASSWORD}@hotbox-pg:5432/hotbox"
      PORT: "9090"
