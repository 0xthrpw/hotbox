http:
  middlewares:
    hotbox-auth:
      forwardAuth:
        address: "http://hotbox-api:3000/internal/authz"
        authResponseHeaders:
          - "x-hotbox-token-id"
          - "x-hotbox-token-tier"
          - "x-hotbox-token-scopes"
          - "x-hotbox-service-id"
        trustForwardHeader: true

  services:
    # Referenced by per-service routers via `ingress_via: hotbox-rpc-proxy@file`.
    # The proxy resolves which Erigon to forward to from the service_id header.
    # Stays here because per-service routers reference it by `@file`.
    #
    # The hotbox-web and hotbox-api routers used to live here too — moved to
    # docker labels in compose.hotbox.yml because the file provider does not
    # substitute ${HOTBOX_WEB_HOST}-style env vars (the docker provider does).
    hotbox-rpc-proxy:
      loadBalancer:
        servers:
          - url: "http://hotbox-rpc-proxy:9090"
