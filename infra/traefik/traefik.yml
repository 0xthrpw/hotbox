global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

api:
  dashboard: false

log:
  level: INFO
  format: json

accessLog:
  format: json
  bufferingSize: 100

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: hotbox-public
    constraints: "Label(`hotbox.managed`,`true`)"
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Two cert resolvers:
#   le-http : HTTP-01 challenge on :80. Used by the control-plane hostnames
#             (hotbox web + api) and by any service that sets a custom
#             `hostname` field. Cheap, no DNS provider creds needed.
#   le-dns  : DNS-01 challenge via Cloudflare for the wildcard
#             *.${HOTBOX_AUTO_SUBDOMAIN_BASE}. Used by services that opt
#             in to `auto_subdomain`. Issues exactly one cert for the
#             wildcard — every auto subdomain reuses it, sidestepping LE
#             rate limits and avoiding a fresh challenge per service.
#
# The ACME email is intentionally NOT set here as `email: ${ACME_EMAIL}` —
# Traefik does not substitute env vars in its static YAML config. Set it
# via the env-var equivalents in compose.hotbox.yml:
#   TRAEFIK_CERTIFICATESRESOLVERS_LE_HTTP_ACME_EMAIL
#   TRAEFIK_CERTIFICATESRESOLVERS_LE_DNS_ACME_EMAIL
certificatesResolvers:
  le-http:
    acme:
      storage: /etc/traefik/acme/acme-http.json
      httpChallenge:
        entryPoint: web
  le-dns:
    acme:
      storage: /etc/traefik/acme/acme-dns.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 10
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
