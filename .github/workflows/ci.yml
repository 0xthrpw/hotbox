name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve native build scripts
        # argon2 has prebuilt binaries; this lets the post-install fetch them
        # so the auth tests don't fall back to a missing native module.
        run: pnpm approve-builds || true

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          CI: '1'
